<div class="flex flex-col gap-3 my-3 sm:flex-row sm:items-center sm:justify-between">
    <select [formControl]="estado"
        class="w-full bg-gray-50 border border-gray-300 text-textos text-sm rounded-lg focus:ring-p1 focus:border-p1 p-2.5 sm:w-auto">
        <option value="S">Activos</option>
        <option value="N">Inactivos</option>
    </select>
    <button (click)="openDialog()" class="px-4 py-2 font-semibold text-white rounded-lg bg-p1 hover:bg-p2">
        Añadir
    </button>
</div>

<div class="overflow-x-auto border border-gray-100 shadow-sm rounded-xl">
    <table class="w-full min-w-[480px] text-sm text-center text-textos">
        <thead class="text-xs font-semibold tracking-wide uppercase bg-gray-50 text-textos">
            <tr>
                <th scope="col" class="px-6 py-3">Detalle</th>
                <th scope="col" class="px-6 py-3">Estado</th>
                <th scope="col" class="px-6 py-3">Acciones</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
            @if(isLoading()){
            <tr class="bg-white">
                <td colspan="7" class="py-3">
                    <div class="flex items-center justify-center">
                        <div class="loader"></div>
                    </div>
                </td>
            </tr>
            }@else {
            @for (item of listVehiculos(); track $index) {
            <tr class="transition-colors bg-white hover:bg-gray-50">
                <td class="px-6 py-3 font-medium text-gray-700 whitespace-nowrap">{{item.nombre | titlecase}}</td>
                <td class="px-6 py-3 whitespace-nowrap">
                    <div class="flex flex-row items-center justify-center">
                        <div [ngClass]="{'bg-green-500': item.activo == 'S', 'bg-red-500': item.activo == 'N'}"
                            class="h-2.5 w-2.5 rounded-full me-2"></div>
                        {{item.activo | mostrarActivo}}
                    </div>
                </td>
                <td class="px-6 py-3 whitespace-nowrap">
                    @if(item.activo == "S"){
                    <button mat-icon-button matTooltip="Editar" (click)="openDialog(item)">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button matTooltip="Eliminar" (click)="setEstado(item, 'N')">
                        <mat-icon>delete</mat-icon>
                    </button>
                    }@else if(item.activo === "N"){
                    <button mat-icon-button matTooltip="Restaurar" (click)="setEstado(item, 'S')">
                        <mat-icon>restart_alt</mat-icon>
                    </button>
                    }
                </td>
            </tr>
            } @empty {
            <tr class="bg-white">
                <td colspan="7" class="py-6">
                    <div class="flex flex-col items-center justify-center gap-1 text-textos">
                        <mat-icon>hourglass_empty</mat-icon>
                        Sin Datos
                    </div>
                </td>
            </tr>
            }
            }
        </tbody>
    </table>
</div>
