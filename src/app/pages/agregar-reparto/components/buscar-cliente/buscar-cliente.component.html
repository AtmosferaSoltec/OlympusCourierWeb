<div class="relative w-full md:w-[600px]">
  <!-- Input con ícono de búsqueda -->
  <div class="relative group">
    <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4">
      <svg
        class="h-4 w-4 text-textos/40 group-focus-within:text-p-600 transition-colors duration-200"
        fill="none" viewBox="0 0 24 24" stroke="currentColor"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
    </div>
    <input
      type="text"
      class="w-full pl-10 pr-4 py-2.5 text-sm text-t border border-gray-200 rounded-xl bg-white shadow-sm placeholder:text-textos/40 focus:outline-none focus:ring-2 focus:ring-p-500/20 focus:border-p-500 transition-all duration-200"
      placeholder="Buscar por documento o nombre..."
      required
      (input)="onSearch($event)"
    />
  </div>

  <!-- Dropdown resultados -->
  @if (list().length > 0) {
  <div class="absolute z-10 w-full mt-2 rounded-xl bg-white border border-gray-100 shadow-xl overflow-hidden">
    <ul class="divide-y divide-gray-50 max-h-56 overflow-y-auto">
      @for (item of list(); track $index) {
      <li
        (click)="onSelect(item.id)"
        class="flex items-center gap-3 px-4 py-2.5 cursor-pointer hover:bg-p-50 transition-colors duration-150 group/item"
      >
        <div class="flex-shrink-0 w-8 h-8 rounded-full bg-p-100 flex items-center justify-center text-p-700 text-xs font-bold select-none">
          {{ (item.nombres | uppercase).charAt(0) }}
        </div>
        <span class="text-sm font-medium text-t group-hover/item:text-p-700 transition-colors truncate">
          {{ item.nombres | uppercase }}
        </span>
      </li>
      }
    </ul>
  </div>
  }
</div>
