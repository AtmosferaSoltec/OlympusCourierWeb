<div class="flex flex-col">

  <!-- Header -->
  <div class="flex items-center gap-3 px-6 pt-6 pb-4 border-b border-gray-100">
    <div class="w-9 h-9 rounded-xl bg-p-100 flex items-center justify-center flex-shrink-0">
      <svg class="w-5 h-5 text-p-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
    </div>
    <div>
      <h2 class="text-base font-bold text-t">{{ data ? 'Editar Item' : 'Agregar Item' }}</h2>
      <p class="text-xs text-textos/60">{{ data ? 'Modifica los datos del item' : 'Completa los datos del nuevo item' }}</p>
    </div>
  </div>

  <!-- Formulario -->
  <div class="px-6 py-5">
    <div class="flex flex-col gap-4">

      <!-- N° de Guía -->
      <div class="flex flex-col gap-1">
        <label class="text-[10px] font-semibold uppercase tracking-widest text-textos/60">N° de Guía</label>
        <input type="text" placeholder="Ingrese número de guía" [(ngModel)]="num_guia"
          class="w-full px-3 py-2 text-sm text-t bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-p-500/20 focus:border-p-500 transition-all"/>
      </div>

      <!-- Precio + Adicional -->
      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1">
          <label class="text-[10px] font-semibold uppercase tracking-widest text-textos/60">Precio (S/)</label>
          <input type="number" placeholder="0.00" [(ngModel)]="precio"
            class="w-full px-3 py-2 text-sm text-t bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-p-500/20 focus:border-p-500 transition-all"/>
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-[10px] font-semibold uppercase tracking-widest text-textos/60">
            Adicional (S/) <span class="normal-case font-normal text-textos/40">(opcional)</span>
          </label>
          <input type="number" placeholder="0.00" [(ngModel)]="adicional"
            class="w-full px-3 py-2 text-sm text-t bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-p-500/20 focus:border-p-500 transition-all"/>
        </div>
      </div>

      <!-- Clave -->
      <div class="flex flex-col gap-1">
        <label class="text-[10px] font-semibold uppercase tracking-widest text-textos/60">
          Clave <span class="normal-case font-normal text-textos/40">(exactamente 4 caracteres)</span>
        </label>
        <input type="text" maxlength="4" placeholder="Ej: AB12" [(ngModel)]="clave"
          class="w-full px-3 py-2 text-sm text-t bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-p-500/20 focus:border-p-500 transition-all tracking-widest font-mono"/>
      </div>

      <!-- Detalle -->
      <div class="flex flex-col gap-1">
        <label class="text-[10px] font-semibold uppercase tracking-widest text-textos/60">Detalle</label>
        <textarea [(ngModel)]="detalle" placeholder="Ingresa descripción del pedido" rows="5"
          class="w-full px-3 py-2 text-sm text-t bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-p-500/20 focus:border-p-500 transition-all resize-none"></textarea>
      </div>

    </div>
  </div>

  <!-- Footer acciones -->
  <div class="flex items-center justify-end gap-2 px-6 py-4 border-t border-gray-100">
    <button (click)="closeDialog()"
      class="px-4 py-2 text-sm font-semibold text-gray-500 bg-gray-100 hover:bg-gray-200 rounded-xl transition-colors">
      Cancelar
    </button>
    <button (click)="onAceptar()"
      class="px-4 py-2 text-sm font-semibold text-white bg-p-600 hover:bg-p-700 rounded-xl transition-colors shadow-sm">
      {{ data ? 'Actualizar' : 'Guardar' }}
    </button>
  </div>

</div>
